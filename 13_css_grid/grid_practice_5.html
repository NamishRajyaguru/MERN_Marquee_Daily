<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Practice 5</title>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .grid-container {
            background-color: #ffffff;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 900px;
            width: 100%;
        }

        .grid-container img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <img src="https://picsum.photos/id/10/400/400" alt="landscape">
        <img src="https://picsum.photos/id/11/400/400" alt="landscape">
        <img src="https://picsum.photos/id/12/400/400" alt="landscape">
        <img src="https://picsum.photos/id/13/400/400" alt="landscape">
        <img src="https://picsum.photos/id/14/400/400" alt="landscape">
        <img src="https://picsum.photos/id/15/400/400" alt="landscape">
        <img src="https://picsum.photos/id/16/400/400" alt="landscape">
        <img src="https://picsum.photos/id/17/400/400" alt="landscape">
        <img src="https://picsum.photos/id/18/400/400" alt="landscape">
        <img src="https://picsum.photos/id/19/400/400" alt="landscape">
        <img src="https://picsum.photos/id/20/400/400" alt="landscape">
        <img src="https://picsum.photos/id/21/400/400" alt="landscape">
    </div>
</body>
</html>
