<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Practice 4 - Template Areas</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #2b2d4f;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 200px 1fr 200px; 
            grid-template-rows: 80px 1fr 60px; 
            grid-template-areas: 
                "header header header"
                "nav content sidebar"
                "nav footer footer";
            gap: 15px;
            height: 100vh;
        }

        .item {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 2px;
            border-radius: 8px;
        }

        .header {
            grid-area: header;
            background-color: #00a8ff; 
        }

        .nav {
            grid-area: nav;
            background-color: #00a8ff; 
        }

        .content {
            grid-area: content;
            background-color: #00a8ff; 
        }

        .sidebar {
            grid-area: sidebar;
            background-color: #00a8ff; 
        }

        .footer {
            grid-area: footer;
            background-color: #00a8ff; 
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="item header">HEADER</div>
        <div class="item nav">NAV</div>
        <div class="item content">CONTENT</div>
        <div class="item sidebar">SIDEBAR</div>
        <div class="item footer">FOOTER</div>
    </div>

</body>
</html>
