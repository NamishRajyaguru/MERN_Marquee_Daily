<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        body {
            padding: 40px;
            max-width: 400px;
            margin: 0 auto;
            background-color: chocolate;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="date"] {
            margin-top: 5px;
            padding: 5px;
            width: 100%;
            background-color: bisque;
            border-radius: 50px;
        }
        .label {
            font-weight: bold;
        }
        #gender{
            margin: 10px 0;
        }
        .gender {
            margin-left: 10px;
        }
        #btn{
            margin: 20px;
            display: flex;
            justify-content: center;
        }
        #btn button{
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Form</h1>
    <br>

    <label for="fname" class="label">
        First Name :
    </label>
    <input type="text" id="fname">
    <br>
    <br>

    <label for="lname" class="label">
        Last Name :
    </label>
    <input type="text" id="lname">
    <br>
    <br>

    <label for="cname" class="label">
        City Name :
    </label>
    <input type="text" id="cname">
    <br>
    <br>

    <div id="gender">
        <label class="label">
            Gender :
        </label>
        <label for="m" class="gender">Male</label><input type="radio" name="gender" id="m">
        <label for="f" class="gender">Female</label><input type="radio" name="gender" id="f">
        <br>
        <br>
    </div>

    <div id="date">
        <label for="dob" class="label">
            Date of Birth :
        </label>
        <input type="date" name="dob" id="dob">
    </div>

    <div id = "btn">
    <button>Submit</button>
    </div>
</body>

</html>
