<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>
<body>
    <h2>To-Do List</h2>
    
    <div>
        <input type="text" id="taskInput" placeholder="Enter a task">
        <button id="addBtn">Add</button>
        <button id="removeLastBtn">Remove Last Task</button>
    </div>
    
    <ul id="taskList"></ul>

    <script>
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const removeLastBtn = document.getElementById('removeLastBtn');
        const taskList = document.getElementById('taskList');

        // Remove the red border when the user starts typing
        taskInput.addEventListener('input', () => {
            taskInput.style.border = '';
        });

        // Add a new task
        addBtn.addEventListener('click', () => {
            const taskText = taskInput.value.trim();
            
            // Validation: check if the input is empty
            if (taskText === '') {
                taskInput.style.border = '2px solid red';
                return;
            }

            // Create new list item
            const li = document.createElement('li');
            li.innerText = taskText + ' ';

            // Create a remove button for the specific task
            const removeBtn = document.createElement('button');
            removeBtn.innerText = 'Remove';
            
            // Use the remove() method to delete the element when clicked
            removeBtn.addEventListener('click', () => {
                li.remove(); 
            });

            // Append the button to the list item
            li.append(removeBtn);
            
            // Append the list item to the list
            taskList.append(li);

            // Clear the input box after successfully adding
            taskInput.value = '';
            taskInput.style.border = '';
        });

        // Example of removeChild(): Remove the last task in the list
        removeLastBtn.addEventListener('click', () => {
            if (taskList.lastElementChild) {
                taskList.removeChild(taskList.lastElementChild);
            }
        });
    </script>
</body>
</html>
