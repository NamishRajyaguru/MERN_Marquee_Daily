<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
        }

        .grid {
            margin: 120px 40px 40px;   
            display: grid;
            gap: 15px;
            padding: 25px;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(4, 95px);
            border: 2px solid white;
            background-color: black;
        }

        .box {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
            color: white;
            font-size: xx-large;
        }

        #box1 {
            grid-column: 1/3;
            grid-row: 1/3;
            border: 2px solid yellow;
        }

        #box2 {
            grid-column: 3/4;
            grid-row: 1/2;
            border: 2px solid green;
        }

        #box3 {
            grid-column: 4/5;
            grid-row: 1/2;
            border: 2px solid green;
        }

        #box4 {
            grid-column: 3/4;
            grid-row: 2/3;
            border: 2px solid green;
        }

        #box5 {
            grid-column: 4/5;
            grid-row: 2/3;
            border: 2px solid green;
        }

        #box6 {
            grid-column: 5/7;
            grid-row: 1/3;
            border: 2px solid yellow;
        }

        #box7 {
            grid-column: 1/7;
            grid-row: 3/4;
            border: 2px solid red;
        }

        #box8 {
            grid-column: 1/2;
            grid-row: 4/5;
            border: 2px solid purple;
        }

        #box9 {
            grid-column: 2/6;
            grid-row: 4/5;
            border: 2px solid purple;
        }

        #box10 {
            grid-column: 6/7;
            grid-row: 4/5;
            border: 2px solid purple;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="box" id="box1">1</div>
        <div class="box" id="box2">2</div>
        <div class="box" id="box3">3</div>
        <div class="box" id="box4">4</div>
        <div class="box" id="box5">5</div>
        <div class="box" id="box6">6</div>
        <div class="box" id="box7">7</div>
        <div class="box" id="box8">8</div>
        <div class="box" id="box9">9</div>
        <div class="box" id="box10">10</div>
    </div>
</body>
</html>
