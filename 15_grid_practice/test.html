<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 170px);
            padding: 10px;
            border: 2px solid;
            gap: 10px;
        }

        .box {
            border: 2px black;
            background-color: black;
        }

        #box1 {
            grid-column: 1/2;
            grid-row: 1/3;
        }

        #box2{
            grid-column: 2/3;
            grid-row: 1/2;
        }

        #box3{
            grid-column: 3/4;
            grid-row: 1/2;
        }

        #box4{
            grid-column: 4/5;
            grid-row: 1/3;
        }

        #box5{
            grid-column: 2/4;
            grid-row: 2/3;
        }

        #box6{
            grid-column: 1/5;
            grid-row: 3/4;
        }

        #box7{
            grid-column: 1/2;
            grid-row: 4/5;
        }

        #box8{
            grid-column: 2/3;
            grid-row: 4/5;
        }

        #box9{
            grid-column: 3/span 1.5;
            grid-row: 4/5;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="box" id="box1"></div>
        <div class="box" id="box2"></div>
        <div class="box" id="box3"></div>
        <div class="box" id="box4"></div>
        <div class="box" id="box5"></div>
        <div class="box" id="box6"></div>
        <div class="box" id="box7"></div>
        <div class="box" id="box8"></div>
        <div class="box" id="box9"></div>
    </div>
</body>
</html>
