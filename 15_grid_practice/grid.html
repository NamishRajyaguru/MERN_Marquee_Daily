<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Practice</title>
    <style>
        body {
            background-color: #f0f2f5; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 220px);
            gap: 5px;
            width: 900px;
            padding: 20px;
        }

        .card {
            border: black solid;
            padding: 25px;
            display: flex;
            flex-direction: column;
            color: #2b2b2b;
            box-sizing: border-box;
        }

        .card-customization {
            grid-column: 1 / 2;
            grid-row: 1 / 3;
            background-color: #2600ff;
        }
        
        .card-customization p {
            margin-top: auto;
        }

        .card-scheduling {
            grid-column: 2 / 4;
            grid-row: 1 / 2;
            background-color: #ff0033;
            justify-content: center;
        }

        .card-wallet {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            background-color: #aaff00;
            justify-content: flex-end;
        }

        .card-inbox {
            grid-column: 3 / 4;
            grid-row: 2 / 3;
            background-color: #ffd900;
        }

        .card-send-gifts {
            grid-column: 1 / 3;
            grid-row: 3 / 4;
            background-color: #ff7300;
            justify-content: flex-end;
        }

        .card-reminders {
            grid-column: 3 / 4;
            grid-row: 3 / 4;
            background-color: #0077ff;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="card card-customization">
        </div>
        
        <div class="card card-scheduling">
        </div>
        
        <div class="card card-wallet">
        </div>
        
        <div class="card card-inbox">
        </div>
        
        <div class="card card-send-gifts">
        </div>
        
        <div class="card card-reminders">
        </div>
    </div>

</body>
</html>
