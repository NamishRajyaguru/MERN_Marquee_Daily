<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Board</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1e1e1e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .controls {
            margin: 15px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: coral;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: rgb(196, 94, 57);
        }

        canvas {
            border: 3px solid whitesmoke;
            background-color: #434343;
            border-radius: 8px;
            cursor: crosshair;
            transition: background-color 0.3s ease;
        }
    </style>
</head>
<body>
    <div id = "control">
        <button id = "clearBtn">Clear Board</button>
        <p><strong>Tip: </srtong>Right Click to change the Brush Color | Double Click to change Background Color</p>
    </div>
    <canvas id = "paintCanvas" width = "800" height = "500">

    </canvas>
    <script src= "script.js"></script>
</body>
</html>
